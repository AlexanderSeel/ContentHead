query ListAssets($siteId: Int!, $limit: Int, $offset: Int, $search: String, $folderId: Int, $tags: [String!]) {
  listAssets(siteId: $siteId, limit: $limit, offset: $offset, search: $search, folderId: $folderId, tags: $tags) {
    total
    items {
      id
      siteId
      filename
      originalName
      mimeType
      bytes
      width
      height
      checksum
      storagePath
      title
      altText
      description
      tagsJson
      folderId
      createdAt
      updatedAt
    }
  }
}

query GetAsset($id: Int!) {
  getAsset(id: $id) {
    id
    siteId
    filename
    originalName
    mimeType
    bytes
    width
    height
    checksum
    storagePath
    title
    altText
    description
    tagsJson
    folderId
    createdAt
    updatedAt
  }
}

query ListAssetFolders($siteId: Int!) {
  listAssetFolders(siteId: $siteId) {
    id
    siteId
    parentId
    name
    path
    createdAt
    createdBy
  }
}

mutation CreateAssetFolder($siteId: Int!, $name: String!, $parentId: Int, $by: String) {
  createAssetFolder(siteId: $siteId, name: $name, parentId: $parentId, by: $by) {
    id
    siteId
    parentId
    name
    path
    createdAt
    createdBy
  }
}

mutation UpdateAssetMetadata(
  $id: Int!
  $title: String
  $altText: String
  $description: String
  $tags: [String!]
  $folderId: Int
  $by: String
) {
  updateAssetMetadata(
    id: $id
    title: $title
    altText: $altText
    description: $description
    tags: $tags
    folderId: $folderId
    by: $by
  ) {
    id
    title
    altText
    description
    tagsJson
    folderId
    updatedAt
  }
}

mutation DeleteAsset($id: Int!) {
  deleteAsset(id: $id)
}

