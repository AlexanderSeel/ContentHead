}

mutation UpsertConnector(
  $id: Int
  $domain: String!
  $type: String!
  $name: String!
  $enabled: Boolean!
  $isDefault: Boolean!
  $configJson: String!
) {
  upsertConnector(
    id: $id
    domain: $domain
    type: $type
    name: $name
    enabled: $enabled
    isDefault: $isDefault
    configJson: $configJson
  ) {
    id
    domain
    type
    name
    enabled
    isDefault
    configJson
    createdAt
    updatedAt
  }
}

mutation DeleteConnector($id: Int!) {
