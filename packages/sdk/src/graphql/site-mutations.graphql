mutation UpsertMarket(
  $siteId: Int!
  $code: String!
  $name: String!
  $currency: String
  $timezone: String
  $active: Boolean!
  $isDefault: Boolean!
) {
  upsertMarket(
    siteId: $siteId
    code: $code
    name: $name
    currency: $currency
    timezone: $timezone
    active: $active
    isDefault: $isDefault
  ) {
    code
    name
    currency
    timezone
    active
    isDefault
  }
}

mutation UpsertLocale(
  $siteId: Int!
  $code: String!
  $name: String!
  $active: Boolean!
  $fallbackLocaleCode: String
  $isDefault: Boolean!
) {
  upsertLocale(
    siteId: $siteId
    code: $code
    name: $name
    active: $active
    fallbackLocaleCode: $fallbackLocaleCode
    isDefault: $isDefault
  ) {
    code
    name
    active
    fallbackLocaleCode
    isDefault
  }
}

mutation UpsertSiteLocaleOverride(
  $siteId: Int!
  $code: String!
  $displayName: String
  $fallbackLocaleCode: String
) {
  upsertSiteLocaleOverride(
    siteId: $siteId
    code: $code
    displayName: $displayName
    fallbackLocaleCode: $fallbackLocaleCode
  ) {
    code
    name
    active
    fallbackLocaleCode
    isDefault
  }
}

mutation SetSiteUrlPattern($siteId: Int!, $urlPattern: String!) {
  setSiteUrlPattern(siteId: $siteId, urlPattern: $urlPattern) {
    id
    name
    active
    urlPattern
  }
}

mutation SetSiteMarkets($siteId: Int!, $markets: [SiteMarketInput!]!, $defaultMarketCode: String!) {
  setSiteMarkets(siteId: $siteId, markets: $markets, defaultMarketCode: $defaultMarketCode) {
    code
    name
    currency
    timezone
    active
    isDefault
  }
}

mutation SetSiteLocales($siteId: Int!, $locales: [SiteLocaleInput!]!, $defaultLocaleCode: String!) {
  setSiteLocales(siteId: $siteId, locales: $locales, defaultLocaleCode: $defaultLocaleCode) {
    code
    name
    active
    fallbackLocaleCode
    isDefault
  }
}

mutation SetSiteMarketLocaleMatrix(
  $siteId: Int!
  $combinations: [SiteMarketLocaleInput!]!
  $defaults: MatrixDefaultsInput
) {
  setSiteMarketLocaleMatrix(siteId: $siteId, combinations: $combinations, defaults: $defaults) {
    siteId
    combinations {
      marketCode
      localeCode
      active
      isDefaultForMarket
    }
    defaults {
      defaultMarketCode
      defaultLocaleCode
      marketDefaultLocales {
        marketCode
        localeCode
      }
    }
  }
}
