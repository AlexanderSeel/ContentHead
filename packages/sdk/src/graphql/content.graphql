    localeCode: $localeCode
    variantSetId: $variantSetId
    targetVersionId: $targetVersionId
    prompt: $prompt
  ) {
    variantSetId
    createdKeys
  }
}

mutation AiTranslateVersion(
  $versionId: Int!
  $targetMarketCode: String!
  $targetLocaleCode: String!
  $by: String
) {
  aiTranslateVersion(
    versionId: $versionId
    targetMarketCode: $targetMarketCode
    targetLocaleCode: $targetLocaleCode
    by: $by
  ) {
    contentItemId
    draftVersionId
  }
}
