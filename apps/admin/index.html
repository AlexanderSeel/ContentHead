<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ContentHead Admin</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('contenthead.admin.theme') || '';
          var mode = theme.indexOf('dark') !== -1 ? 'dark' : 'light';
          document.documentElement.dataset.theme = mode;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
